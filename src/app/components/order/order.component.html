<span class="alert">{{errorMsg}}</span>
<span class="info">{{infoMsg}}</span>
<div *ngIf="!isLoading" class="container py-5">

  <div class="text-center mb-4">
    <h1 class="display-5 fw-bold">Order No: {{order.orderId}}</h1>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h4 class="card-title mb-3"><i class="pi pi-file me-2"></i>Order Items</h4>
      <p-table *ngIf="!isLoading" #dt [columns]="cols" [value]="order.orderItems" selectionMode="single" dataKey="product_id">
        <ng-template pTemplate="header">
          <tr>
            <th pResizableColumn [style.width]="'50%'">Name</th>
            <th pResizableColumn [style.width]="'15%'">Quantity</th>
            <th pResizableColumn [style.width]="'20%'">Price</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-rec let-sel>
          <tr>
            <td>{{rec.productName}}</td>
            <td class="rightalign">{{rec.quantity}}</td>
            <td class="rightalign">{{rec.price | number : '1.2-2'}}</td>
          </tr>
        </ng-template>

        <ng-template pTemplate="footer">
          <tr>
            <td></td>
            <td class="fw-bold">Net Total</td>
            <td class="fw-bold">{{order.netTotal| number : '1.2-2'}}</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>

  <div class="text-center">
    <a *ngIf="canCancel" class="btn btn-danger btn-lg me-3">
      <i class="pi pi-times me-2"></i>Cancel Order
    </a>
    <a [routerLink]="'/home'" class="btn btn-primary btn-lg">
      <i class="pi pi-arrow-left me-2"></i>Continue Shopping
    </a>
  </div>

</div>

<p-progressSpinner *ngIf="isLoading" class="tbs-center"></p-progressSpinner>
<p-toast position="center" class="custom-toast"></p-toast>
<p-confirmDialog header="Warning" icon="pi pi-exclamation-triangle"></p-confirmDialog>
