<div class="container py-5">

  <div class="text-center mb-4">
    <p class="lead text-muted mx-auto" style="max-width: 700px;">
      Please login or sign up to make purchases, view order progress and history.
    </p>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <p class="text-muted small fst-italic">* Personal information will never be shared with 3rd parties.</p>
          <amplify-authenticator>
            <ng-template amplifySlot="authenticated" let-user="user" let-signOut="signOut">
              <button class="btn btn-outline-primary" (click)="signOut()">Sign Out</button>
            </ng-template>
          </amplify-authenticator>
        </div>
      </div>
    </div>
  </div>

</div>
